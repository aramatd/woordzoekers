<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Woordzoeker Generatorc</title>
<style>
body { font-family: monospace; }
#grid { margin-top:20px; line-height:1.6; font-size:20px; }
textarea { margin-top:10px; width: 400px; }
.wordGroups { margin-top:10px; }
</style>
</head>
<body>

<h2>Woordzoeker Generator</h2>

<h3>1. Woordenlijst</h3>
<textarea id="words" rows="15">REY
CUENTAS
SALIENDO
DEBIA
TALENTOS
PAGAR
SENOR
VENDER
MUJER
HIJOS
DEUDA
SUPLICABA
PACIENCIA
PERDONO
MISERICORDIA
SOLTO
CONSIERVO
DENARIOS
PAGAME
CARCEL
MALVADO
ROGASTE
PADRE
CORAZON
HERMANO
CELESTIAL
VOSOTROS
OFENSAS
CADA
UNO
DIEZ
YO</textarea>

<h3>2. Verborgen boodschap</h3>
<textarea id="hidden" rows="2">PERDONAIS DE TODO CORAZON</textarea>

<br><br>
<button onclick="generate()">Genereer puzzel</button>

<div class="wordGroups" id="wordGroups"></div>
<p id="totals"></p>

<div id="grid"></div>
<p id="emptyCount"></p>

<h3>Excel-versie (kopiëren)</h3>
<textarea id="excel" rows="20" cols="60"></textarea>

<script>
const minRows = 7;
const minCols = 7;

function generate() {
    let words = document.getElementById("words").value.split("\n")
        .map(w => w.trim().toUpperCase()).filter(w=>w.length>0);

    let hidden = document.getElementById("hidden").value.replace(/\s/g,'').toUpperCase();
    let hiddenLength = hidden.length;

    // Groeperen op lengte
    let groups = {};
    let totalWordLetters = 0;
    words.forEach(w=>{
        totalWordLetters += w.length;
        if(!groups[w.length]) groups[w.length] = [];
        groups[w.length].push(w);
    });

    let groupHtml = '';
    Object.keys(groups).sort((a,b)=>a-b).forEach(len=>{
        groupHtml += len + ' letters: ' + groups[len].join(', ') + '<br>';
    });
    document.getElementById('wordGroups').innerHTML = groupHtml;
    document.getElementById('totals').innerHTML = 
        "Totaal aantal letters in woordenlijst: " + totalWordLetters +
        "<br>Totaal aantal letters in verborgen boodschap: " + hiddenLength;

    // Raster automatisch kleiner maken (nog steeds minimaal 7×7)
    let estSide = Math.ceil(Math.sqrt(totalWordLetters + hiddenLength)*0.85);
    let rows = Math.max(minRows, estSide);
    let cols = Math.max(minCols, estSide);
    let grid = Array.from({length: rows}, ()=>Array(cols).fill(""));

    // Plaatsen van woorden
    let wordIndex = 0;
    for(let i=0;i<words.length;i++){
        let word = words[i];
        let placed = false;
        let directions = [];
        if(wordIndex<5) directions = ["D1","D2"];
        else directions = (wordIndex%2===0) ? ["H","V"] : ["V","H"]; // afwisselend
        directions = directions.sort(()=>Math.random()-0.5);

        for(let dir of directions){
            let attempt=0;
            while(!placed && attempt<1000){
                attempt++;
                let row = Math.floor(Math.random()*rows);
                let col = Math.floor(Math.random()*cols);
                let len = word.length;

                function canPlace(rInc,cInc){
                    for(let j=0;j<len;j++){
                        let r = row + j*rInc;
                        let c = col + j*cInc;
                        if(r<0 || r>=rows || c<0 || c>=cols) return false;
                        if(grid[r][c]!=="" && grid[r][c]!==word[j]) return false;
                    }
                    return true;
                }
                function placeWord(rInc,cInc){
                    for(let j=0;j<len;j++){
                        grid[row + j*rInc][col + j*cInc] = word[j];
                    }
                    placed = true;
                }

                if(dir==="H" && canPlace(0,1)) placeWord(0,1);
                else if(dir==="V" && canPlace(1,0)) placeWord(1,0);
                else if(dir==="D1" && canPlace(1,1)) placeWord(1,1);
                else if(dir==="D2" && canPlace(1,-1)) placeWord(1,-1);
            }
        }
        wordIndex++;
    }

    // Tellen lege vakjes
    let emptyCount=0;
    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            if(grid[r][c]==="") emptyCount++;
        }
    }

    let maxEmpty = Math.min(emptyCount, hiddenLength);
    let lettersToAdd = Math.max(0, hiddenLength - emptyCount);

    document.getElementById("emptyCount").innerText =
        "Aantal lege vakjes (max " + hiddenLength + "): " + maxEmpty +
        " | Letters verborgen boodschap die je handmatig moet toevoegen: " + lettersToAdd;

    // Raster tonen
    let htmlOutput="";
    let excelOutput="";
    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            let letter = grid[r][c] || "_";
            htmlOutput+=letter+" ";
            excelOutput+=letter+"\t";
        }
        htmlOutput+="<br>";
        excelOutput+="\n";
    }
    document.getElementById("grid").innerHTML=htmlOutput;
    document.getElementById("excel").value=excelOutput;
}
</script>

</body>
</html>
