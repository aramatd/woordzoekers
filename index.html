<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woordzoeker Generator</title>
<style>
body { font-family: Arial; padding: 20px; }
textarea { width: 300px; height: 150px; }
table { border-collapse: collapse; margin-top: 20px; }
td {
  width: 30px; height: 30px;
  border: 1px solid #999;
  text-align: center;
  font-weight: bold;
}
</style>
</head>
<body>

<h2>Woordzoeker Generator</h2>

<label>Woorden (één per regel):</label><br>
<textarea id="words"></textarea><br><br>

<label>Grid grootte:</label>
<select id="size" onchange="updateAdvice()">
  <option value="10">10x10</option>
  <option value="12">12x12</option>
  <option value="15">15x15</option>
  <option value="20">20x20</option>
</select>

<p id="advice"></p>

<button onclick="startGeneration()">Genereer</button>

<p>Tijd: <span id="timer">30</span>s</p>
<p id="status"></p>

<div id="grid"></div>

<script>
const directions = [
  { dx: 1, dy: 0 }, { dx: -1, dy: 0 },
  { dx: 0, dy: 1 }, { dx: 0, dy: -1 },
  { dx: 1, dy: 1 }, { dx: -1, dy: -1 },
  { dx: 1, dy: -1 }, { dx: -1, dy: 1 }
];

function updateAdvice() {
  const size = parseInt(document.getElementById("size").value);
  const totalCells = size * size;
  const minLetters = Math.floor(totalCells * 0.8);
  const maxLetters = Math.floor(totalCells * 1.1);

  document.getElementById("advice").textContent =
    `Aanbevolen totaal aantal letters: ${minLetters} - ${maxLetters}.`;
}

function createGrid(size) {
  return Array.from({ length: size }, () => Array(size).fill(null));
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function canPlace(grid, word, x, y, dir) {
  for (let i = 0; i < word.length; i++) {
    const nx = x + dir.dx * i;
    const ny = y + dir.dy * i;

    if (ny < 0 || ny >= grid.length || nx < 0 || nx >= grid.length) return false;

    const cell = grid[ny][nx];
    if (cell !== null && cell !== word[i]) return false;
  }
  return true;
}

function placeWord(grid, word, x, y, dir) {
  for (let i = 0; i < word.length; i++) {
    const nx = x + dir.dx * i;
    const ny = y + dir.dy * i;
    grid[ny][nx] = word[i];
  }
}

function removeWord(grid, word, x, y, dir) {
  for (let i = 0; i < word.length; i++) {
    const nx = x + dir.dx * i;
    const ny = y + dir.dy * i;
    grid[ny][nx] = null;
  }
}

function getPlacements(grid, word) {
  const placements = [];
  const size = grid.length;

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      for (let dir of directions) {
        if (canPlace(grid, word, x, y, dir)) {
          placements.push({ x, y, dir });
        }
      }
    }
  }

  return placements;
}

function countEmpty(grid) {
  let count = 0;
  for (let row of grid) {
    for (let cell of row) {
      if (cell === null) count++;
    }
  }
  return count;
}

async function generate(words, size) {
  const grid = createGrid(size);
  words.sort((a, b) => b.length - a.length);

  const start = Date.now();
  const TIME_LIMIT = 30000;

  async function backtrack(index) {
    if (Date.now() - start > TIME_LIMIT) return "timeout";

    if (index === words.length) return true;

    const word = words[index];
    let placements = getPlacements(grid, word);
    shuffle(placements);

    for (let p of placements) {
      placeWord(grid, word, p.x, p.y, p.dir);

      const result = await backtrack(index + 1);

      if (result === true) return true;
      if (result === "timeout") return "timeout";

      removeWord(grid, word, p.x, p.y, p.dir);
    }

    return false;
  }

  const result = await backtrack(0);

  if (result === true) {
    const empty = countEmpty(grid);
    return { success: empty <= 15, grid, empty };
  }

  return { success: false, reason: result };
}

function drawGrid(grid) {
  const container = document.getElementById("grid");
  container.innerHTML = "";

  const table = document.createElement("table");

  for (let row of grid) {
    const tr = document.createElement("tr");
    for (let cell of row) {
      const td = document.createElement("td");
      td.textContent = cell || "";
      tr.appendChild(td);
    }
    table.appendChild(tr);
  }

  container.appendChild(table);
}

function startTimer() {
  let remaining = 30;
  document.getElementById("timer").textContent = remaining;

  const interval = setInterval(() => {
    remaining--;
    document.getElementById("timer").textContent = remaining;

    if (remaining <= 0) clearInterval(interval);
  }, 1000);
}

async function startGeneration() {
  const words = document.getElementById("words")
    .value.split("\n")
    .map(w => w.trim().toUpperCase())
    .filter(w => w.length > 0);

  const size = parseInt(document.getElementById("size").value);

  const totalLetters = words.reduce((sum, w) => sum + w.length, 0);

  document.getElementById("status").textContent =
    `Totaal letters: ${totalLetters}`;

  startTimer();

  const result = await generate(words, size);

  if (result.success) {
    drawGrid(result.grid);
    document.getElementById("status").textContent =
      `Gelukt. Lege vakjes: ${result.empty}`;
  } else {
    let msg = "Mislukt: ";

    if (result.reason === "timeout") {
      msg += "tijdslimiet bereikt";
    } else {
      msg += "geen oplossing";
    }

    document.getElementById("status").textContent = msg;
  }
}

updateAdvice();
</script>

</body>
</html>
