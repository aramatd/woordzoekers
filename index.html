<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Woordzoeker Generator</title>
<style>
body { font-family: monospace; }
#grid { margin-top:20px; line-height:1.6; font-size:20px; }
textarea { margin-top:10px; width: 400px; }
.wordGroups { margin-top:10px; }
</style>
</head>
<body>

<h2>Woordzoeker Generator</h2>

<h3>1. Woordenlijst</h3>
<textarea id="words" rows="15">REY
CUENTAS
SALIENDO
DEBIA
TALENTOS
PAGAR
SENOR
VENDER
MUJER
HIJOS
DEUDA
SUPLICABA
PACIENCIA
PERDONO
MISERICORDIA
SOLTO
CONSIERVO
DENARIOS
PAGAME
CARCEL
MALVADO
ROGASTE
PADRE
CORAZON
HERMANO
CELESTIAL
VOSOTROS
OFENSAS
CADA
UNO
DIEZ
YO</textarea>

<h3>2. Verborgen boodschap</h3>
<textarea id="hidden" rows="2">PERDONAIS DE TODO CORAZON</textarea>

<br><br>
<button onclick="generate()">Genereer puzzel</button>

<div class="wordGroups" id="wordGroups"></div>
<p id="totals"></p>

<div id="grid"></div>
<p id="emptyCount"></p>

<h3>Excel-versie (kopiëren)</h3>
<textarea id="excel" rows="20" cols="60"></textarea>

<script>
const maxEmpty = 22;
const minRows = 7;
const minCols = 7;
const DIRS = { H:[0,1], V:[1,0], D1:[1,1], D2:[1,-1] };

function shuffle(array){return array.sort(()=>Math.random()-0.5);}
function createGrid(rows,cols){return Array.from({length:rows},()=>Array(cols).fill(""));}

function canPlace(grid, word, r, c, dir){
    let [rInc,cInc]=DIRS[dir];
    for(let i=0;i<word.length;i++){
        let rr=r+i*rInc, cc=c+i*cInc;
        if(rr<0||rr>=grid.length||cc<0||cc>=grid[0].length) return false;
        if(grid[rr][cc]!="" && grid[rr][cc]!==word[i]) return false;
    }
    return true;
}

function placeWord(grid, word, r, c, dir){
    let [rInc,cInc]=DIRS[dir];
    for(let i=0;i<word.length;i++){
        grid[r+i*rInc][c+i*cInc]=word[i];
    }
}

function generate(){
    let words = document.getElementById("words").value.split("\n").map(w=>w.trim().toUpperCase()).filter(w=>w.length>0);
    let hidden = document.getElementById("hidden").value.replace(/\s/g,'').toUpperCase();
    let hiddenLength = hidden.length;

    // Groeperen op lengte
    let groups = {};
    let totalWordLetters = 0;
    words.forEach(w=>{
        totalWordLetters+=w.length;
        if(!groups[w.length]) groups[w.length]=[];
        groups[w.length].push(w);
    });

    let groupHtml="";
    Object.keys(groups).sort((a,b)=>a-b).forEach(len=>{
        groupHtml+=len+' letters: '+groups[len].join(', ')+'<br>';
    });
    document.getElementById('wordGroups').innerHTML=groupHtml;
    document.getElementById('totals').innerHTML=
        "Totaal letters woordenlijst: "+totalWordLetters+"<br>"+
        "Totaal letters verborgen boodschap: "+hiddenLength;

    // Init raster
    let estSide = Math.ceil(Math.sqrt(totalWordLetters)*1.1);
    let rows = Math.max(minRows, estSide);
    let cols = Math.max(minCols, estSide);
    let grid = createGrid(rows,cols);
    
    // Plaats diagonaal eerst (eerste 5)
    for(let i=0;i<Math.min(5,words.length);i++){
        let word = words[i];
        let placed=false;
        let attempts=0;
        while(!placed && attempts<100){
            attempts++;
            let dir = i%2===0?"D1":"D2";
            let r = Math.floor(Math.random()*(rows-word.length));
            let c = Math.floor(Math.random()*(cols-word.length));
            if(canPlace(grid,word,r,c,dir)){
                placeWord(grid,word,r,c,dir);
                placed=true;
            }
        }
        if(!placed) alert("Kon diagonaal woord '"+word+"' niet plaatsen");
    }

    // Plaats rest afwisselend horizontaal/verticaal
    for(let i=5;i<words.length;i++){
        let word = words[i];
        let placed=false;
        let directions = (i%2===0)?["H","V"]:["V","H"];
        let attempts=0;
        while(!placed && attempts<1000){
            attempts++;
            let dir = directions[attempts%directions.length];
            let r = Math.floor(Math.random()*(rows-(dir==="V"?word.length:0)));
            let c = Math.floor(Math.random()*(cols-(dir==="H"?word.length:0)));
            if(canPlace(grid,word,r,c,dir)){
                placeWord(grid,word,r,c,dir);
                placed=true;
            }
        }
        if(!placed) alert("Kon horizontaal/verticaal woord '"+word+"' niet plaatsen");
    }

    // Check aantal lege vakjes
    let emptyCount = grid.flat().filter(v=>v==="").length;
    if(emptyCount>maxEmpty){
        // Raster verkleinen en opnieuw proberen
        while(emptyCount>maxEmpty && rows>minRows && cols>minCols){
            rows--; cols--;
            grid=createGrid(rows,cols);
            emptyCount = grid.flat().filter(v=>v==="").length;
        }
    }

    document.getElementById("emptyCount").innerText=
        "Aantal lege vakjes: "+emptyCount+
        " | Max "+maxEmpty+
        " | Letters verborgen boodschap: "+hiddenLength+
        " | Letters handmatig toevoegen: "+Math.max(0,hiddenLength-emptyCount);

    // Toon raster
    let htmlOutput="", excelOutput="";
    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            let letter=grid[r][c]||"_";
            htmlOutput+=letter+" ";
            excelOutput+=letter+"\t";
        }
        htmlOutput+="<br>";
        excelOutput+="\n";
    }
    document.getElementById("grid").innerHTML=htmlOutput;
    document.getElementById("excel").value=excelOutput;
}
</script>
</body>
</html>
