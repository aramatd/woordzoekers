</textarea>

<br><br>
<button onclick="generate()">Genereer puzzel</button>

<div id="grid"></div>

<script>

const size = 15
const maxAttempts = 5000

function generate(){

let words = document.getElementById("words").value
.split("\n")
.map(w=>w.trim())
.filter(w=>w.length>0)

let totalLetters = words.reduce((sum,w)=>sum+w.length,0)

if(totalLetters !== size*size){
alert("Aantal letters is "+totalLetters+" maar het raster heeft "+(size*size)+" vakjes.")
return
}

words.sort((a,b)=>b.length-a.length)

let attempts = 0
let success = false
let grid

while(!success && attempts < maxAttempts){

attempts++

grid = Array.from({length:size},()=>Array(size).fill(""))
success = true

for(let word of words){

let placed = false

for(let tryPos=0;tryPos<2000 && !placed;tryPos++){

let dir = Math.random()<0.5 ? "H" : "V"
let row = Math.floor(Math.random()*size)
let col = Math.floor(Math.random()*size)

if(dir==="H" && col+word.length<=size){

let fits=true

for(let i=0;i<word.length;i++){
if(grid[row][col+i]!="") fits=false
}

if(fits){
for(let i=0;i<word.length;i++){
grid[row][col+i]=word[i]
}
placed=true
}

}

if(dir==="V" && row+word.length<=size){

let fits=true

for(let i=0;i<word.length;i++){
if(grid[row+i][col]!="") fits=false
}

if(fits){
for(let i=0;i<word.length;i++){
grid[row+i][col]=word[i]
}
placed=true
}

}

}

if(!placed){
success=false
break
}

}

}

if(!success){
alert("Geen oplossing gevonden na "+maxAttempts+" pogingen.")
return
}

draw(grid)

}

function draw(grid){

let container = document.getElementById("grid")
container.innerHTML=""

for(let r=0;r<size;r++){
for(let c=0;c<size;c++){

let cell=document.createElement("div")
cell.className="cell"
cell.textContent=grid[r][c]

container.appendChild(cell)

}
}

}

</script>

</body>
</html>
