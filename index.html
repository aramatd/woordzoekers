<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Woordzoeker Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
}

#grid{
    display:grid;
    grid-template-columns: repeat(15,30px);
    gap:2px;
    margin-top:20px;
}

.cell{
    width:30px;
    height:30px;
    border:1px solid #999;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:16px;
}
</style>
</head>

<body>

<h2>Woordzoeker Generator</h2>

<textarea id="words" rows="12" cols="30">
REY
CUENTAS

</textarea>

<br><br>

<button onclick="generate()">Genereer puzzel</button>

<div id="grid"></div>

<script>

const size = 15

function generate(){

let grid = Array.from({length:size},()=>Array(size).fill(""))

let words = document.getElementById("words").value
.split("\n")
.map(w=>w.trim())
.filter(w=>w.length>0)

words.sort((a,b)=>b.length-a.length)

for(let word of words){

let placed = false

for(let attempt=0;attempt<1000 && !placed;attempt++){

let dir = Math.random()<0.5 ? "H" : "V"

let row = Math.floor(Math.random()*size)
let col = Math.floor(Math.random()*size)

if(dir==="H" && col+word.length<=size){

let fits = true

for(let i=0;i<word.length;i++){
if(grid[row][col+i]!="") fits=false
}

if(fits){
for(let i=0;i<word.length;i++){
grid[row][col+i]=word[i]
}
placed=true
}

}

if(dir==="V" && row+word.length<=size){

let fits = true

for(let i=0;i<word.length;i++){
if(grid[row+i][col]!="") fits=false
}

if(fits){
for(let i=0;i<word.length;i++){
grid[row+i][col]=word[i]
}
placed=true
}

}

}

}

draw(grid)

}

function draw(grid){

let container = document.getElementById("grid")
container.innerHTML=""

for(let r=0;r<size;r++){
for(let c=0;c<size;c++){

let cell=document.createElement("div")
cell.className="cell"
cell.textContent=grid[r][c]

container.appendChild(cell)

}
}

}

</script>

</body>
</html>
