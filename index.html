<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Woordzoeker Generator</title>
<style>
body { font-family: monospace; }
#grid { margin-top:20px; line-height:1.6; font-size:20px; }
textarea { margin-top:10px; width: 400px; }
.wordGroups { margin-top:10px; }
</style>
</head>
<body>

<h2>Woordzoeker Generator</h2>

<h3>1. Woordenlijst</h3>
<textarea id="words" rows="15">REY
CUENTAS
SALIENDO
DEBIA
TALENTOS
PAGAR
SENOR
VENDER
MUJER
HIJOS
DEUDA
SUPLICABA
PACIENCIA
PERDONO
MISERICORDIA
SOLTO
CONSIERVO
DENARIOS
PAGAME
CARCEL
MALVADO
ROGASTE
PADRE
CORAZON
HERMANO
CELESTIAL
VOSOTROS
OFENSAS
CADA
UNO
DIEZ
YO</textarea>

<h3>2. Verborgen boodschap</h3>
<textarea id="hidden" rows="2">PERDONAIS DE TODO CORAZON</textarea>

<br><br>
<button onclick="generate()">Genereer puzzel</button>

<div class="wordGroups" id="wordGroups"></div>
<p id="totals"></p>

<div id="grid"></div>
<p id="emptyCount"></p>

<h3>Excel-versie (kopiëren)</h3>
<textarea id="excel" rows="20" cols="60"></textarea>

<script>
// Minimum rasterafmetingen
const minRows = 7;
const minCols = 7;

function generate() {
    // Woordenlijst
    let words = document.getElementById("words").value.split("\n")
        .map(w => w.trim().toUpperCase()).filter(w=>w.length>0);

    // Verborgen boodschap
    let hidden = document.getElementById("hidden").value.replace(/\s/g,'').toUpperCase();
    let hiddenLength = hidden.length;

    // Groepeer woorden op lengte
    let groups = {};
    let totalWordLetters = 0;
    words.forEach(w=>{
        totalWordLetters += w.length;
        if(!groups[w.length]) groups[w.length] = [];
        groups[w.length].push(w);
    });

    let groupHtml = '';
    Object.keys(groups).sort((a,b)=>a-b).forEach(len=>{
        groupHtml += len + ' letters: ' + groups[len].join(', ') + '<br>';
    });
    document.getElementById('wordGroups').innerHTML = groupHtml;

    document.getElementById('totals').innerHTML = "Totaal aantal letters in woordenlijst: " + totalWordLetters +
        "<br>Totaal aantal letters in verborgen boodschap: " + hiddenLength;

    // Bepaal rasterafmetingen (minder vakjes dan totaal letters)
    let totalLetters = totalWordLetters + hiddenLength;
    let rows = Math.max(minRows, Math.floor(Math.sqrt(totalLetters)*0.9));
    let cols = Math.max(minCols, Math.floor(Math.sqrt(totalLetters)*0.9));

    let grid = Array.from({length: rows}, ()=>Array(cols).fill(""));

    // Plaatsing: eerste 5 diagonaal
    let wordIndex = 0;
    for(let i=0;i<words.length;i++){
        let word = words[i];
        let placed = false;
        let directions = [];
        if(wordIndex<5) directions = ["D1","D2"]; // eerst 5 diagonaal
        else directions = (wordIndex%2===0) ? ["H"] : ["V"]; // daarna afwisselend
        directions = directions.sort(()=>Math.random()-0.5);

        for(let dir of directions){
            let attempt=0;
            while(!placed && attempt<500){
                attempt++;
                let row = Math.floor(Math.random()*rows);
                let col = Math.floor(Math.random()*cols);
                let len = word.length;

                if(dir==="H" && col+len<=cols){
                    let fits=true;
                    for(let j=0;j<len;j++){
                        if(grid[row][col+j]!=="") fits=false;
                    }
                    if(fits){for(let j=0;j<len;j++){grid[row][col+j]=word[j];} placed=true;}

                } else if(dir==="V" && row+len<=rows){
                    let fits=true;
                    for(let j=0;j<len;j++){
                        if(grid[row+j][col]!=="") fits=false;
                    }
                    if(fits){for(let j=0;j<len;j++){grid[row+j][col]=word[j];} placed=true;}

                } else if(dir==="D1" && row+len<=rows && col+len<=cols){ // TL->BR
                    let fits=true;
                    for(let j=0;j<len;j++){
                        if(grid[row+j][col+j]!=="") fits=false;
                    }
                    if(fits){for(let j=0;j<len;j++){grid[row+j][col+j]=word[j];} placed=true;}

                } else if(dir==="D2" && row+len<=rows && col-len+1>=0){ // TR->BL
                    let fits=true;
                    for(let j=0;j<len;j++){
                        if(grid[row+j][col-j]!=="") fits=false;
                    }
                    if(fits){for(let j=0;j<len;j++){grid[row+j][col-j]=word[j];} placed=true;}
                }
            }
        }
        wordIndex++;
    }

    // Tellen van lege vakjes
    let emptyCount=0;
    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            if(grid[r][c]==="") emptyCount++;
        }
    }

    document.getElementById("emptyCount").innerText =
        "Aantal vakjes tekort voor verborgen boodschap: " + Math.max(0, hiddenLength - emptyCount);

    // Toon raster
    let htmlOutput="";
    let excelOutput="";
    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            let letter = grid[r][c] || "_";
            htmlOutput+=letter+" ";
            excelOutput+=letter+"\t";
        }
        htmlOutput+="<br>";
        excelOutput+="\n";
    }
    document.getElementById("grid").innerHTML=htmlOutput;
    document.getElementById("excel").value=excelOutput;
}
</script>

</body>
</html>
