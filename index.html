<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Woordzoeker Generator</title>
<style>
body { font-family: Arial; padding:20px; }
textarea, input { width:100%; margin-bottom:10px; }
button { padding:10px; }
#grid { white-space:pre; font-family:monospace; margin-top:20px; }
</style>
</head>
<body>

<h2>Woordzoeker Generator</h2>

<label>Woorden (1 per regel)</label>
<textarea id="words"></textarea>

<label>Verborgen boodschap</label>
<input id="message">

<button onclick="generate()">Genereer</button>

<div id="output"></div>
<pre id="grid"></pre>

<script>

// ======================= MAIN =======================

function generate() {
    let words = document.getElementById("words").value
        .toUpperCase().split("\n")
        .map(w=>w.trim()).filter(w=>w);

    let message = document.getElementById("message").value
        .toUpperCase().replace(/[^A-Z]/g,"");

    let result = generatePuzzle(words, message);

    if (result.success) {
        document.getElementById("grid").textContent = drawGrid(result.grid);
        document.getElementById("output").textContent = "Gelukt!";
    } else {
        document.getElementById("grid").textContent = "";
        document.getElementById("output").textContent = result.reason;
    }
}

// ======================= GENERATOR =======================

function generatePuzzle(words, message) {

    words.sort((a,b)=>b.length-a.length);

    let totalLetters = words.reduce((a,w)=>a+w.length,0);
    let baseSize = Math.ceil(Math.sqrt(totalLetters + message.length));

    let maxAttempts = 5000;

    for (let size = baseSize; size <= baseSize+3; size++) {

        for (let attempt=0; attempt<maxAttempts; attempt++) {

            let grid = createGrid(size, message);

            let dirs = createDirectionList(words.length);

            let success = solve(grid, words, dirs);

            if (success) {
                fillRandom(grid);
                return {success:true, grid};
            }
        }

        // als alles faalt → analyse
        let analysis = analyzeFailure(words, message, size);
        return {success:false, reason:analysis};
    }
}

// ======================= SOLVER =======================

function solve(grid, words, directions) {

    if (words.length === 0) return true;

    let options = words.map((word, i)=>({
        word,
        dirType: directions[i],
        positions: getPositionsByType(grid, word, directions[i])
    }));

    options.sort((a,b)=>a.positions.length - b.positions.length);

    let current = options[0];

    if (current.positions.length === 0) return false;

    for (let pos of current.positions) {

        let snapshot = copyGrid(grid);

        placeAt(grid, current.word, pos);

        let remainingWords = words.filter(w=>w!==current.word);
        let remainingDirs = directions.slice(1);

        if (solve(grid, remainingWords, remainingDirs)) return true;

        copyInto(grid, snapshot);
    }

    return false;
}

// ======================= POSITIES =======================

function getPositionsByType(grid, word, type) {
    let results = [];
    let dirs = getDirs(type);

    for (let dir of dirs) {
        for (let y=0;y<grid.length;y++) {
            for (let x=0;x<grid.length;x++) {
                if (canPlace(grid, word, x, y, dir)) {
                    results.push({x,y,dir});
                }
            }
        }
    }
    return results;
}

// ======================= GRID =======================

function createGrid(size, message) {
    let grid = Array.from({length:size}, ()=>Array(size).fill(null));

    let i=0;
    for (let y=0;y<size;y++) {
        for (let x=0;x<size;x++) {
            if (i < message.length) {
                grid[y][x] = message[i++];
            }
        }
    }
    return grid;
}

function fillRandom(grid) {
    let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    for (let y=0;y<grid.length;y++) {
        for (let x=0;x<grid.length;x++) {
            if (grid[y][x] === null) {
                grid[y][x] = letters[Math.floor(Math.random()*letters.length)];
            }
        }
    }
}

// ======================= PLAATSEN =======================

function canPlace(grid, word, x, y, dir) {
    let dx = dir[0], dy = dir[1];
    let size = grid.length;

    let endX = x + dx*(word.length-1);
    let endY = y + dy*(word.length-1);

    if (endX<0||endY<0||endX>=size||endY>=size) return false;

    for (let i=0;i<word.length;i++) {
        let cx = x + dx*i;
        let cy = y + dy*i;

        let cell = grid[cy][cx];

        if (cell!==null && cell!==word[i]) return false;
    }

    return true;
}

function placeAt(grid, word, pos) {
    let {x,y,dir} = pos;
    let dx = dir[0], dy = dir[1];

    for (let i=0;i<word.length;i++) {
        grid[y+dy*i][x+dx*i] = word[i];
    }
}

// ======================= HULP =======================

function getDirs(type) {
    if (type==="H") return [[1,0],[-1,0]];
    if (type==="V") return [[0,1],[0,-1]];
    return [[1,1],[-1,-1],[1,-1],[-1,1]];
}

function createDirectionList(n) {
    let base = Math.floor(n/3);
    let rest = n % 3;

    let list = [
        ...Array(base).fill("H"),
        ...Array(base).fill("V"),
        ...Array(base).fill("D")
    ];

    for (let i=0;i<rest;i++) {
        list.push(["H","V","D"][i]);
    }

    return shuffle(list);
}

function copyGrid(grid) {
    return grid.map(row=>row.slice());
}

function copyInto(target, source) {
    for (let y=0;y<target.length;y++) {
        for (let x=0;x<target.length;x++) {
            target[y][x] = source[y][x];
        }
    }
}

function shuffle(arr) {
    for (let i=arr.length-1;i>0;i--) {
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
}

function drawGrid(grid) {
    return grid.map(r=>r.join(" ")).join("\n");
}

// ======================= ANALYSE =======================

function analyzeFailure(words, message, size) {

    let tips = [];

    let totalLetters = words.reduce((a,w)=>a+w.length,0);
    let cells = size*size;

    let verschil = (totalLetters + message.length) - cells;

    if (verschil > 0) {
        tips.push("Je komt " + verschil + " vakjes tekort");
        tips.push("Verkort totaal met " + verschil + " letters");
    }

    let longest = Math.max(...words.map(w=>w.length));
    if (longest > size) {
        tips.push("Langste woord ("+longest+") past niet in raster ("+size+")");
    }

    let joined = words.join("");
    let unique = new Set(joined).size;

    if (unique / joined.length > 0.8) {
        tips.push("Woorden delen weinig letters → weinig overlap mogelijk");
    }

    tips.push("Probeer een groter raster of kortere woorden");

    return "Geen oplossing gevonden:\n- " + tips.join("\n- ");
}

</script>

</body>
</html>
