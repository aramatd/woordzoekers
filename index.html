<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Woordzoeker Generator</title>
<style>
body { font-family: Arial; text-align: center; }
#grid { display: grid; gap: 2px; justify-content: center; margin-top: 20px; }
.cell { width: 30px; height: 30px; border: 1px solid #ccc; display:flex; align-items:center; justify-content:center; font-weight:bold; }
</style>
</head>
<body>

<h2>Woordzoeker Generator</h2>
<textarea id="words" rows="5" cols="40" placeholder="Voer woorden in, gescheiden door komma's"></textarea><br><br>
<button onclick="start()">Genereer</button>
<p id="timer"></p>
<p id="status"></p>
<div id="grid"></div>

<script>
const directions = [
  {dx:1,dy:0,type:'h'}, {dx:-1,dy:0,type:'h'},
  {dx:0,dy:1,type:'v'}, {dx:0,dy:-1,type:'v'},
  {dx:1,dy:1,type:'d'}, {dx:-1,dy:-1,type:'d'},
  {dx:-1,dy:1,type:'d'}, {dx:1,dy:-1,type:'d'}
];

function start(){
  let words = document.getElementById('words').value
    .toUpperCase()
    .replace(/[^A-Z,]/g,'')
    .split(',')
    .filter(w=>w.length>0);

  words = [...new Set(words)];

  let startTime = Date.now();
  let best = null;

  function loop(){
    let elapsed = (Date.now()-startTime)/1000;
    document.getElementById('timer').innerText = "Tijd: " + (10 - elapsed).toFixed(1);

    if(elapsed > 10){
      finish(best);
      return;
    }

    let attempt = generate(words);

    if(attempt){
      let score = scoreGrid(attempt);
      if(!best || score > best.score){
        best = {grid:attempt, score};
      }
    }

    requestAnimationFrame(loop);
  }

  loop();
}

function generate(words){
  let maxLen = Math.max(...words.map(w=>w.length));
  let size = maxLen + Math.floor(Math.random()*8);

  let grid = Array.from({length:size},()=>Array(size).fill(''));

  words = [...words].sort((a,b)=>b.length-a.length);

  for(let word of words){
    let placed = placeWord(grid, word);
    if(!placed) return null;
  }

  if(!checkEmpty(grid)) return null;

  return grid;
}

function placeWord(grid, word){
  let size = grid.length;
  let options = [];

  for(let dir of directions){
    for(let x=0;x<size;x++){
      for(let y=0;y<size;y++){
        let overlap = 0;
        let ok = true;

        for(let i=0;i<word.length;i++){
          let nx = x + dir.dx*i;
          let ny = y + dir.dy*i;

          if(nx<0||ny<0||nx>=size||ny>=size){ ok=false; break; }

          let c = grid[ny][nx];
          if(c && c!==word[i]){ ok=false; break; }
          if(c===word[i]) overlap++;
        }

        if(ok) options.push({x,y,dir,overlap});
      }
    }
  }

  options.sort((a,b)=>b.overlap-a.overlap);

  if(options.length===0) return false;

  let pick = options[Math.floor(Math.random()*Math.min(5,options.length))];

  for(let i=0;i<word.length;i++){
    let nx = pick.x + pick.dir.dx*i;
    let ny = pick.y + pick.dir.dy*i;
    grid[ny][nx] = word[i];
  }

  return true;
}

function checkEmpty(grid){
  let empty = 0;

  for(let y=0;y<grid.length;y++){
    let streak = 0;
    for(let x=0;x<grid.length;x++){
      if(!grid[y][x]){
        empty++;
        streak++;
        if(streak>1) return false;
      } else {
        streak=0;
      }
    }
  }

  return empty<=20;
}

function scoreGrid(grid){
  let empty = 0;
  for(let row of grid){
    for(let c of row){
      if(!c) empty++;
    }
  }
  return 100 - empty - grid.length;
}

function finish(best){
  if(!best){
    document.getElementById('status').innerText = "Geen goede puzzel gevonden";
    return;
  }

  render(best.grid);
  document.getElementById('status').innerText = "Beste poging weergegeven";
}

function render(grid){
  let div = document.getElementById('grid');
  div.innerHTML='';
  div.style.gridTemplateColumns = `repeat(${grid.length}, 30px)`;

  for(let y=0;y<grid.length;y++){
    for(let x=0;x<grid.length;x++){
      let cell = document.createElement('div');
      cell.className='cell';
      cell.innerText = grid[y][x] || '';
      div.appendChild(cell);
    }
  }
}
</script>

</body>
</html>
