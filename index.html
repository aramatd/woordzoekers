<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Woordzoeker Generator – Slim</title>
<style>
body { font-family: monospace; }
#grid { margin-top:20px; line-height:1.6; font-size:20px; }
textarea { margin-top:10px; width: 400px; }
.wordGroups { margin-top:10px; }
</style>
</head>
<body>

<h2>Woordzoeker Generator – Max lege vakjes = verborgen boodschap</h2>

<h3>1. Woordenlijst</h3>
<textarea id="words" rows="15">REY
CUENTAS
SALIENDO
DEBIA
TALENTOS
PAGAR
SENOR
VENDER
MUJER
HIJOS
DEUDA
SUPLICABA
PACIENCIA
PERDONO
MISERICORDIA
SOLTO
CONSIERVO
DENARIOS
PAGAME
CARCEL
MALVADO
ROGASTE
PADRE
CORAZON
HERMANO
CELESTIAL
VOSOTROS
OFENSAS
CADA
UNO
DIEZ
YO</textarea>

<h3>2. Verborgen boodschap</h3>
<textarea id="hidden" rows="2">PERDONAIS DE TODO CORAZON</textarea>

<br><br>
<button onclick="generate()">Genereer puzzel</button>

<div class="wordGroups" id="wordGroups"></div>
<p id="totals"></p>

<div id="grid"></div>
<p id="emptyCount"></p>

<h3>Excel-versie (kopiëren)</h3>
<textarea id="excel" rows="20" cols="60"></textarea>

<script>
const minRows=7;
const minCols=7;
const maxDiagWords=5;

function createGrid(rows,cols){return Array.from({length:rows},()=>Array(cols).fill(""));}

function canPlace(grid,word,r,c,rInc,cInc){
    for(let i=0;i<word.length;i++){
        let rr=r+i*rInc, cc=c+i*cInc;
        if(rr<0||rr>=grid.length||cc<0||cc>=grid[0].length) return false;
        if(grid[rr][cc]!="" && grid[rr][cc]!==word[i]) return false;
    }
    return true;
}

function placeWord(grid,word,r,c,rInc,cInc){
    for(let i=0;i<word.length;i++){
        grid[r+i*rInc][c+i*cInc]=word[i];
    }
}

function generate(){
    let words=document.getElementById("words").value.split("\n").map(w=>w.trim().toUpperCase()).filter(w=>w.length>0);
    let hidden=document.getElementById("hidden").value.replace(/\s/g,'').toUpperCase();
    let hiddenLength=hidden.length;

    let totalWordLetters=words.reduce((a,b)=>a+b.length,0);

    // Woorden groeperen op lengte
    let groups={};
    words.forEach(w=>{
        if(!groups[w.length]) groups[w.length]=[];
        groups[w.length].push(w);
    });

    let groupHtml="";
    Object.keys(groups).sort((a,b)=>a-b).forEach(len=>{
        groupHtml+=len+' letters: '+groups[len].join(', ')+'<br>';
    });
    document.getElementById('wordGroups').innerHTML=groupHtml;
    document.getElementById('totals').innerHTML=
        "Totaal letters woordenlijst: "+totalWordLetters+"<br>"+
        "Totaal letters verborgen boodschap: "+hiddenLength;

    // Bepaal rastergrootte zodat max lege vakjes <= hiddenLength
    let rows=Math.max(minRows, Math.ceil(Math.sqrt(totalWordLetters + hiddenLength)));
    let cols=Math.max(minCols, Math.ceil(Math.sqrt(totalWordLetters + hiddenLength)));

    while((rows*cols - totalWordLetters) > hiddenLength){
        if(rows>=cols) rows--;
        else cols--;
        if(rows<minRows) rows=minRows;
        if(cols<minCols) cols=minCols;
    }

    let grid=createGrid(rows,cols);

    // 1. Diagonaal-woorden plaatsen (kortste, verspreid)
    let diagWords=words.slice().sort((a,b)=>a.length-b.length).slice(0,Math.min(maxDiagWords,words.length));
    for(let i=0;i<diagWords.length;i++){
        let word=diagWords[i];
        let placed=false;
        for(let r=0;r<=rows-word.length && !placed;r++){
            for(let c=0;c<=cols-word.length && !placed;c++){
                let rInc=1;
                let cInc=(i%2===0)?1:-1;
                if(canPlace(grid,word,r,c,rInc,cInc)){
                    placeWord(grid,word,r,c,rInc,cInc);
                    placed=true;
                }
            }
        }
    }

    // 2. Overige woorden horizontaal/verticaal met maximale kruising
    let remainingWords=words.filter(w=>!diagWords.includes(w));
    for(let word of remainingWords){
        let bestScore=-1, bestPos=null;
        for(let r=0;r<rows;r++){
            for(let c=0;c<cols;c++){
                for(let [rInc,cInc] of [[0,1],[1,0]]){ 
                    if(canPlace(grid,word,r,c,rInc,cInc)){
                        let score=0;
                        for(let i=0;i<word.length;i++){
                            let rr=r+i*rInc, cc=c+i*cInc;
                            if(grid[rr][cc]===word[i]) score++;
                        }
                        if(score>bestScore){
                            bestScore=score;
                            bestPos={r,c,rInc,cInc};
                        }
                    }
                }
            }
        }
        if(bestPos) placeWord(grid,word,bestPos.r,bestPos.c,bestPos.rInc,bestPos.cInc);
    }

    // 3. Werkelijk aantal lege vakjes tellen
    let actualEmptyCount=grid.flat().filter(v=>v==="").length;

    // 4. Controle: aantal lege vakjes mag nooit groter zijn dan verborgen boodschap
    // Alleen lege vakjes tonen, geen X
    if(actualEmptyCount>hiddenLength){
        // Probeer raster kleiner maken en opnieuw plaatsen
        let success=false;
        for(let shrink=1; shrink<=5; shrink++){
            let newRows=Math.max(minRows, rows-shrink);
            let newCols=Math.max(minCols, cols-shrink);
            let newGrid=createGrid(newRows,newCols);
            // herplaats diagonaal + horizontaal/verticaal
            let placedAll=true;
            // Diagonaal
            for(let i=0;i<diagWords.length;i++){
                let word=diagWords[i], placed=false;
                for(let r=0;r<=newRows-word.length && !placed;r++){
                    for(let c=0;c<=newCols-word.length && !placed;c++){
                        let rInc=1;
                        let cInc=(i%2===0)?1:-1;
                        if(canPlace(newGrid,word,r,c,rInc,cInc)){
                            placeWord(newGrid,word,r,c,rInc,cInc);
                            placed=true;
                        }
                    }
                }
                if(!placed) placedAll=false;
            }
            // Overige
            let remainingWords=words.filter(w=>!diagWords.includes(w));
            for(let word of remainingWords){
                let bestScore=-1, bestPos=null;
                for(let r=0;r<newRows;r++){
                    for(let c=0;c<newCols;c++){
                        for(let [rInc,cInc] of [[0,1],[1,0]]){ 
                            if(canPlace(newGrid,word,r,c,rInc,cInc)){
                                let score=0;
                                for(let i=0;i<word.length;i++){
                                    let rr=r+i*rInc, cc=c+i*cInc;
                                    if(newGrid[rr][cc]===word[i]) score++;
                                }
                                if(score>bestScore){
                                    bestScore=score;
                                    bestPos={r,c,rInc,cInc};
                                }
                            }
                        }
                    }
                    if(bestPos) placeWord(newGrid,word,bestPos.r,bestPos.c,bestPos.rInc,bestPos.cInc);
                }
            }
            let emptyCount=newGrid.flat().filter(v=>v==="").length;
            if(emptyCount<=hiddenLength){
                grid=newGrid;
                rows=newRows;
                cols=newCols;
                actualEmptyCount=emptyCount;
                success=true;
                break;
            }
        }
    }

    // 5. Toon raster
    let htmlOutput="",excelOutput="";
    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            let letter=grid[r][c]||"_";
            htmlOutput+=letter+" ";
            excelOutput+=letter+"\t";
        }
        htmlOutput+="<br>";
        excelOutput+="\n";
    }
    document.getElementById("grid").innerHTML=htmlOutput;
    document.getElementById("excel").value=excelOutput;
    document.getElementById("emptyCount").innerText=
        "Aantal lege vakjes: "+actualEmptyCount+
        " | Letters verborgen boodschap: "+hiddenLength+
        " | Letters handmatig toevoegen: "+Math.max(0,hiddenLength-actualEmptyCount);
}
</script>

</body>
</html>
