<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Woordzoeker Generator – Max lege vakjes = verborgen boodschap</title>
<style>
body { font-family: monospace; }
#grid { margin-top:20px; line-height:1.6; font-size:20px; }
textarea { margin-top:10px; width: 400px; }
.wordGroups { margin-top:10px; }
</style>
</head>
<body>

<h2>Woordzoeker Generator – Max lege vakjes = verborgen boodschap</h2>

<h3>1. Woordenlijst</h3>
<textarea id="words" rows="15">REY
CUENTAS
SALIENDO
DEBIA
TALENTOS
PAGAR
SENOR
VENDER
MUJER
HIJOS
DEUDA
SUPLICABA
PACIENCIA
PERDONO
MISERICORDIA
SOLTO
CONSIERVO
DENARIOS
PAGAME
CARCEL
MALVADO
ROGASTE
PADRE
CORAZON
HERMANO
CELESTIAL
VOSOTROS
OFENSAS
CADA
UNO
DIEZ
YO</textarea>

<h3>2. Verborgen boodschap</h3>
<textarea id="hidden" rows="2">PERDONAIS DE TODO CORAZON</textarea>

<br><br>
<button onclick="generate()">Genereer puzzel</button>

<div class="wordGroups" id="wordGroups"></div>
<p id="totals"></p>

<div id="grid"></div>
<p id="emptyCount"></p>

<h3>Excel-versie (kopiëren)</h3>
<textarea id="excel" rows="20" cols="60"></textarea>

<script>
const minRows = 7;
const minCols = 7;
const maxDiagWords = 5;

function shuffle(array){return array.sort(()=>Math.random()-0.5);}
function createGrid(rows,cols){return Array.from({length:rows},()=>Array(cols).fill(""));}

function canPlace(grid,word,r,c,rInc,cInc){
    for(let i=0;i<word.length;i++){
        let rr=r+i*rInc, cc=c+i*cInc;
        if(rr<0||rr>=grid.length||cc<0||cc>=grid[0].length) return false;
        if(grid[rr][cc]!="" && grid[rr][cc]!==word[i]) return false;
    }
    return true;
}

function placeWord(grid,word,r,c,rInc,cInc){
    for(let i=0;i<word.length;i++){
        grid[r+i*rInc][c+i*cInc]=word[i];
    }
}

function generate(){
    let words=document.getElementById("words").value.split("\n").map(w=>w.trim().toUpperCase()).filter(w=>w.length>0);
    let hidden=document.getElementById("hidden").value.replace(/\s/g,'').toUpperCase();
    let hiddenLength=hidden.length;

    // Groeperen op lengte
    let groups={};
    let totalWordLetters=0;
    words.forEach(w=>{
        totalWordLetters+=w.length;
        if(!groups[w.length]) groups[w.length]=[];
        groups[w.length].push(w);
    });

    let groupHtml="";
    Object.keys(groups).sort((a,b)=>a-b).forEach(len=>{
        groupHtml+=len+' letters: '+groups[len].join(', ')+'<br>';
    });
    document.getElementById('wordGroups').innerHTML=groupHtml;
    document.getElementById('totals').innerHTML=
        "Totaal letters woordenlijst: "+totalWordLetters+"<br>"+
        "Totaal letters verborgen boodschap: "+hiddenLength;

    // Bepaal raster zodat aantal lege vakjes nooit > hiddenLength
    let totalLetters = totalWordLetters;
    let estSide = Math.ceil(Math.sqrt(totalLetters + hiddenLength));
    let rows = Math.max(minRows, estSide);
    let cols = Math.max(minCols, estSide);

    while((rows*cols - totalLetters) > hiddenLength){
        if(rows >= cols) rows--;
        else cols--;
        if(rows<minRows) rows=minRows;
        if(cols<minCols) cols=minCols;
    }

    let grid=createGrid(rows,cols);

    // Sorteer woorden op lengte voor diagonaal (kortste kiezen)
    let diagWords = words.slice().sort((a,b)=>a.length-b.length).slice(0,Math.min(maxDiagWords,words.length));

    // Plaats diagonaal langs rand
    for(let i=0;i<diagWords.length;i++){
        let word = diagWords[i];
        let placed=false;
        for(let rStart=0; rStart<=rows-word.length; rStart++){
            if(placed) break;
            for(let cStart=0; cStart<=cols-word.length; cStart++){
                let rInc=1;
                let cInc=(i%2===0)?1:-1;
                if(canPlace(grid,word,rStart,cStart,rInc,cInc)){
                    placeWord(grid,word,rStart,cStart,rInc,cInc);
                    placed=true;
                    break;
                }
            }
        }
    }

    // Plaats overige woorden horizontaal/verticaal met maximale kruising
    let remainingWords = words.filter(w=>!diagWords.includes(w));
    for(let word of remainingWords){
        let placed=false;
        let bestScore=-1;
        let bestPos=null;
        for(let r=0;r<rows;r++){
            for(let c=0;c<cols;c++){
                for(let [rInc,cInc] of [[0,1],[1,0]]){
                    if(canPlace(grid,word,r,c,rInc,cInc)){
                        // Score = aantal letters dat kruist
                        let score=0;
                        for(let i=0;i<word.length;i++){
                            let rr=r+i*rInc, cc=c+i*cInc;
                            if(grid[rr][cc]===word[i]) score++;
                        }
                        if(score>bestScore){
                            bestScore=score;
                            bestPos={r,c,rInc,cInc};
                        }
                    }
                }
            }
        }
        if(bestPos){
            placeWord(grid,word,bestPos.r,bestPos.c,bestPos.rInc,bestPos.cInc);
        }
    }

    // Tellen lege vakjes
    let emptyCount=grid.flat().filter(v=>v==="").length;
    if(emptyCount>hiddenLength) emptyCount=hiddenLength;

    document.getElementById("emptyCount").innerText=
        "Aantal lege vakjes: "+emptyCount+
        " | Letters verborgen boodschap: "+hiddenLength+
        " | Letters handmatig toevoegen: "+Math.max(0,hiddenLength-emptyCount);

    // Toon raster
    let htmlOutput="",excelOutput="";
    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            let letter=grid[r][c]||"_";
            htmlOutput+=letter+" ";
            excelOutput+=letter+"\t";
        }
        htmlOutput+="<br>";
        excelOutput+="\n";
    }
    document.getElementById("grid").innerHTML=htmlOutput;
    document.getElementById("excel").value=excelOutput;
}
</script>

</body>
</html>
