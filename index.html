<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Woordzoeker Generator</title>
<style>
body { font-family: Arial; padding:20px; }
textarea, input { width:100%; margin-bottom:10px; }
button { padding:10px; }
#grid { white-space:pre; font-family:monospace; margin-top:20px; }
</style>
</head>
<body>

<h2>Woordzoeker Generator</h2>

<label>Woorden (1 per regel)</label>
<textarea id="words"></textarea>

<label>Verborgen boodschap</label>
<input id="message">

<button onclick="generate()">Genereer</button>

<div id="output"></div>
<pre id="grid"></pre>

<script>

function generate() {
    let words = document.getElementById("words").value
        .toUpperCase().split("\n")
        .map(w=>w.trim()).filter(w=>w);

    let message = document.getElementById("message").value
        .toUpperCase().replace(/[^A-Z]/g,"");

    let result = generatePuzzle(words, message);

    if (result.success) {
        document.getElementById("grid").textContent = drawGrid(result.grid);
        document.getElementById("output").textContent = "Gelukt!";
    } else {
        document.getElementById("grid").textContent = "";
        document.getElementById("output").textContent = result.reason;
    }
}

// ======================= GENERATOR =======================

function generatePuzzle(words, message) {

    words.sort((a,b)=>b.length-a.length);

    let totalLetters = words.reduce((a,w)=>a+w.length,0);
    let baseSize = Math.ceil(Math.sqrt(totalLetters + message.length));

    for (let size = Math.max(5, baseSize - 2); size <= baseSize + 2; size++) {

        let grid = createGrid(size);

        let messageCells = getRandomCells(grid, message.length);
        let messageMap = buildMessageMap(messageCells, message);

        let dirs = createDirectionList(words.length);

        let success = solve(grid, words, dirs, messageMap);

        if (success) {
            let empty = countEmpty(grid);
            let verschil = empty - message.length;

            if (Math.abs(verschil) <= 10) {
                placeMessage(grid, message, messageCells);
                return {success:true, grid};
            }
        }
    }

    return {
        success:false,
        reason: analyzeFailure(words, message, baseSize)
    };
}

// ======================= SLIMME SOLVER =======================

function solve(grid, words, directions, messageMap) {

    if (words.length === 0) return true;

    let bestIndex = -1;
    let bestOptions = null;

    for (let i=0;i<words.length;i++) {

        let options = getPositionsByType(grid, words[i], directions[i], messageMap);

        if (options.length === 0) return false;

        if (!bestOptions || options.length < bestOptions.length) {
            bestOptions = options;
            bestIndex = i;
        }
    }

    let word = words[bestIndex];

    for (let pos of bestOptions) {

        let snapshot = copyGrid(grid);

        placeAt(grid, word, pos);

        let newWords = words.slice();
        let newDirs = directions.slice();

        newWords.splice(bestIndex,1);
        newDirs.splice(bestIndex,1);

        if (solve(grid, newWords, newDirs, messageMap)) return true;

        copyInto(grid, snapshot);
    }

    return false;
}

// ======================= REST (ongewijzigd) =======================

function getPositionsByType(grid, word, type, messageMap) {
    let results = [];
    let dirs = getDirs(type);

    for (let dir of dirs) {
        for (let y=0;y<grid.length;y++) {
            for (let x=0;x<grid.length;x++) {
                if (canPlace(grid, word, x, y, dir, messageMap)) {
                    results.push({x,y,dir});
                }
            }
        }
    }
    return results;
}

function createGrid(size) {
    return Array.from({length:size}, ()=>Array(size).fill(null));
}

function getRandomCells(grid, count) {
    let cells = [];

    for (let y=0;y<grid.length;y++) {
        for (let x=0;x<grid.length;x++) {
            cells.push({x,y});
        }
    }

    shuffle(cells);
    return cells.slice(0, count);
}

function buildMessageMap(cells, message) {
    let map = {};
    for (let i=0;i<cells.length;i++) {
        let {x,y} = cells[i];
        if (!map[y]) map[y] = {};
        map[y][x] = message[i];
    }
    return map;
}

function placeMessage(grid, message, cells) {
    for (let i=0;i<message.length;i++) {
        let {x,y} = cells[i];
        grid[y][x] = message[i];
    }
}

function canPlace(grid, word, x, y, dir, messageMap) {
    let dx = dir[0], dy = dir[1];
    let size = grid.length;

    let endX = x + dx*(word.length-1);
    let endY = y + dy*(word.length-1);

    if (endX<0||endY<0||endX>=size||endY>=size) return false;

    for (let i=0;i<word.length;i++) {
        let cx = x + dx*i;
        let cy = y + dy*i;

        let cell = grid[cy][cx];

        if (messageMap[cy] && messageMap[cy][cx] && messageMap[cy][cx] !== word[i]) {
            return false;
        }

        if (cell!==null && cell!==word[i]) return false;
    }

    return true;
}

function placeAt(grid, word, pos) {
    let {x,y,dir} = pos;
    let dx = dir[0], dy = dir[1];

    for (let i=0;i<word.length;i++) {
        grid[y+dy*i][x+dx*i] = word[i];
    }
}

function countEmpty(grid) {
    let count = 0;
    for (let row of grid) {
        for (let cell of row) {
            if (cell === null) count++;
        }
    }
    return count;
}

function getDirs(type) {
    if (type==="H") return [[1,0],[-1,0]];
    if (type==="V") return [[0,1],[0,-1]];
    return [[1,1],[-1,-1],[1,-1],[-1,1]];
}

function createDirectionList(n) {
    let base = Math.floor(n/3);
    let rest = n % 3;

    let list = [
        ...Array(base).fill("H"),
        ...Array(base).fill("V"),
        ...Array(base).fill("D")
    ];

    for (let i=0;i<rest;i++) {
        list.push(["H","V","D"][i]);
    }

    return list;
}

function copyGrid(grid) {
    return grid.map(row=>row.slice());
}

function copyInto(target, source) {
    for (let y=0;y<target.length;y++) {
        for (let x=0;x<target.length;x++) {
            target[y][x] = source[y][x];
        }
    }
}

function shuffle(arr) {
    for (let i=arr.length-1;i>0;i--) {
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
}

function drawGrid(grid) {
    return grid.map(r=>r.join(" ")).join("\n");
}

function analyzeFailure(words, message, size) {

    let tips = [];

    let totalLetters = words.reduce((a,w)=>a+w.length,0);
    let cells = size*size;

    let verschil = (totalLetters + message.length) - cells;

    if (verschil > 0) {
        tips.push("Je komt " + verschil + " vakjes tekort");
    } else {
        tips.push("Raster is waarschijnlijk te groot");
        tips.push("Maak je boodschap langer");
    }

    let lengths = words.map(w=>w.length);
    let counts = {};

    lengths.forEach(l=>counts[l]=(counts[l]||0)+1);

    for (let l in counts) {
        if (counts[l] > 4) {
            tips.push("Te veel woorden van lengte " + l + " → vervang er 1 door andere lengte");
        }
    }

    return "Geen oplossing gevonden:\n- " + tips.join("\n- ");
}

</script>

</body>
</html>
