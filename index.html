<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Woordzoeker Generator 1747</title>
<style>
body{
  font-family: monospace;
}
#grid{
  margin-top:20px;
  line-height:1.6;
  font-size:20px;
}
.solution{
  color:red;
  font-weight:bold;
}
textarea{
  margin-top:10px;
}
</style>
</head>
<body>

<h2>Woordzoeker Generator</h2>

<br><br>
<button onclick="generate()">Genereer puzzel</button>

<div id="grid"></div>
<h3>Excel-versie (kopiëren)</h3>
<textarea id="excel" rows="20" cols="60"></textarea>

<script>
const size = 15;
const maxAttempts = 5000;
const solution = "PERDONAISDETODOCORAZON";

function generate() {
  let words = document.getElementById("words").value
    .split("\n")
    .map(w => w.trim())
    .filter(w => w.length>0);

  let totalLetters = words.reduce((sum,w)=>sum+w.length,0);
  if(totalLetters !== size*size){
    alert("Aantal letters is "+totalLetters+" maar het raster heeft "+(size*size)+" vakjes.");
    return;
  }

  // Lange woorden eerst
  words.sort((a,b)=>b.length - a.length);

  let attempts = 0;
  let success=false;
  let grid;
  let solutionCells;

  while(!success && attempts<maxAttempts){
    attempts++;
    grid = Array.from({length:size},()=>Array(size).fill(""));
    solutionCells = Array.from({length:size},()=>Array(size).fill(false));
    success=true;

    for(let word of words){
      let placed=false;
      // volgorde van richtingen per woord shuffle
      let directions = ["H","V","D1","D2"];
      directions = directions.sort(()=>Math.random()-0.5);

      for(let dir of directions){
        // random startpositie
        let row=Math.floor(Math.random()*size);
        let col=Math.floor(Math.random()*size);
        let len = word.length;

        if(dir==="H" && col+len<=size){
          let fits=true;
          for(let i=0;i<len;i++){if(grid[row][col+i]!="") fits=false}
          if(fits){for(let i=0;i<len;i++){grid[row][col+i]=word[i]} placed=true; break;}

        } else if(dir==="V" && row+len<=size){
          let fits=true;
          for(let i=0;i<len;i++){if(grid[row+i][col]!="") fits=false}
          if(fits){for(let i=0;i<len;i++){grid[row+i][col]=word[i]} placed=true; break;}

        } else if(dir==="D1" && row+len<=size && col+len<=size){ // diag TL->BR
          let fits=true;
          for(let i=0;i<len;i++){if(grid[row+i][col+i]!="") fits=false}
          if(fits){for(let i=0;i<len;i++){grid[row+i][col+i]=word[i]} placed=true; break;}

        } else if(dir==="D2" && row+len<=size && col-len+1>=0){ // diag TR->BL
          let fits=true;
          for(let i=0;i<len;i++){if(grid[row+i][col-i]!="") fits=false}
          if(fits){for(let i=0;i<len;i++){grid[row+i][col-i]=word[i]} placed=true; break;}
        }
      }

      if(!placed){success=false; break;}
    }
  }

  if(!success){alert("Geen oplossing gevonden na "+maxAttempts+" pogingen."); return;}

  fillSolution(grid,solutionCells);
  draw(grid,solutionCells);
}

function fillSolution(grid,solutionCells){
  let letters = solution.split("");
  let index=0;
  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      if(grid[r][c]==="@"){
        grid[r][c]=letters[index];
        solutionCells[r][c]=true;
        index++;
      }
    }
  }
}

function draw(grid,solutionCells){
  let htmlOutput="", excelOutput="";
  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      let letter = grid[r][c];
      if(solutionCells[r][c]){htmlOutput+="<span class='solution'>"+letter+"</span>";}
      else{htmlOutput+=letter;}
      excelOutput+=letter;
      if(c<size-1){htmlOutput+=" "; excelOutput+="\t";}
    }
    htmlOutput+="<br>";
    excelOutput+="\n";
  }
  document.getElementById("grid").innerHTML=htmlOutput;
  document.getElementById("excel").value=excelOutput;
}
</script>
</body>
</html>
