<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Woordzoeker Generator – Max 22 lege vakjes</title>
<style>
body { font-family: monospace; }
#grid { margin-top:20px; line-height:1.6; font-size:20px; }
textarea { margin-top:10px; width: 400px; }
.wordGroups { margin-top:10px; }
</style>
</head>
<body>

<h2>Woordzoeker Generator – Max 22 lege vakjes</h2>

<h3>1. Woordenlijst</h3>
<textarea id="words" rows="15">REY
CUENTAS
SALIENDO
DEBIA
TALENTOS
PAGAR
SENOR
VENDER
MUJER
HIJOS
DEUDA
SUPLICABA
PACIENCIA
PERDONO
MISERICORDIA
SOLTO
CONSIERVO
DENARIOS
PAGAME
CARCEL
MALVADO
ROGASTE
PADRE
CORAZON
HERMANO
CELESTIAL
VOSOTROS
OFENSAS
CADA
UNO
DIEZ
YO</textarea>

<h3>2. Verborgen boodschap</h3>
<textarea id="hidden" rows="2">PERDONAIS DE TODO CORAZON</textarea>

<br><br>
<button onclick="generate()">Genereer puzzel</button>

<div class="wordGroups" id="wordGroups"></div>
<p id="totals"></p>

<div id="grid"></div>
<p id="emptyCount"></p>

<h3>Excel-versie (kopiëren)</h3>
<textarea id="excel" rows="20" cols="60"></textarea>

<script>
const minRows = 7;
const minCols = 7;
const maxEmpty = 22;
const DIRS = { H:[0,1], V:[1,0], D1:[1,1], D2:[1,-1] };

// Hulpfuncties
function shuffle(array){return array.sort(()=>Math.random()-0.5);}
function createGrid(rows,cols){return Array.from({length:rows},()=>Array(cols).fill(""));}

// Kan woord geplaatst worden?
function canPlace(grid, word, row, col, dir){
    let [rInc,cInc]=DIRS[dir];
    for(let j=0;j<word.length;j++){
        let r=row+j*rInc, c=col+j*cInc;
        if(r<0||r>=grid.length||c<0||c>=grid[0].length) return false;
        if(grid[r][c]!="" && grid[r][c]!==word[j]) return false;
    }
    return true;
}
function placeWord(grid, word,row,col,dir){
    let [rInc,cInc]=DIRS[dir];
    for(let j=0;j<word.length;j++) grid[row+j*rInc][col+j*cInc]=word[j];
}
function removeWord(grid, word,row,col,dir){
    let [rInc,cInc]=DIRS[dir];
    for(let j=0;j<word.length;j++){
        let r=row+j*rInc,c=col+j*cInc;
        grid[r][c]=""; // geen complex shared logic, laat vakjes leeg
    }
}

function generate(){
    let words = document.getElementById("words").value.split("\n").map(w=>w.trim().toUpperCase()).filter(w=>w.length>0);
    let hidden = document.getElementById("hidden").value.replace(/\s/g,'').toUpperCase();
    let hiddenLength = hidden.length;

    // Groeperen op lengte
    let groups = {};
    let totalWordLetters=0;
    words.forEach(w=>{
        totalWordLetters+=w.length;
        if(!groups[w.length]) groups[w.length]=[];
        groups[w.length].push(w);
    });
    let groupHtml='';
    Object.keys(groups).sort((a,b)=>a-b).forEach(len=>{
        groupHtml+=len+' letters: '+groups[len].join(', ')+'<br>';
    });
    document.getElementById('wordGroups').innerHTML=groupHtml;
    document.getElementById('totals').innerHTML=
        "Totaal letters woordenlijst: "+totalWordLetters+
        "<br>Totaal letters verborgen boodschap: "+hiddenLength;

    // Start rastergrootte
    let estSide = Math.ceil(Math.sqrt(totalWordLetters)*1.1);
    let rows = Math.max(minRows, estSide);
    let cols = Math.max(minCols, estSide);

    let success=false;
    while(!success){
        let grid=createGrid(rows,cols);

        // Plaatsen via backtracking met random startpunten
        function backtrack(index){
            if(index>=words.length){
                let emptyCount = grid.flat().filter(v=>v==="").length;
                return emptyCount <= maxEmpty;
            }

            let word = words[index];
            let directions = index<5?["D1","D2"]:(index%2===0?["H","V"]:["V","H"]);
            directions = shuffle(directions);

            // Maak lijst van alle mogelijke startpunten en shuffle
            let possiblePositions=[];
            for(let r=0;r<rows;r++){
                for(let c=0;c<cols;c++){
                    possiblePositions.push([r,c]);
                }
            }
            possiblePositions=shuffle(possiblePositions);

            for(let dir of directions){
                for(let [r,c] of possiblePositions){
                    if(canPlace(grid,word,r,c,dir)){
                        placeWord(grid,word,r,c,dir);
                        if(backtrack(index+1)) return true;
                        removeWord(grid,word,r,c,dir);
                    }
                }
            }
            return false;
        }

        success=backtrack(0);
        if(!success){
            if(rows>minRows) rows--;
            else if(cols>minCols) cols--;
            else break;
        }
    }

    if(!success){
        alert("Kon geen oplossing vinden binnen max "+maxEmpty+" lege vakjes.");
        return;
    }

    let emptyCount = grid.flat().filter(v=>v==="").length;
    document.getElementById("emptyCount").innerText=
        "Aantal lege vakjes: "+emptyCount+
        " | Max "+maxEmpty+
        " | Letters verborgen boodschap: "+hiddenLength+
        " | Letters die handmatig toevoegen: "+Math.max(0,hiddenLength-emptyCount);

    // Toon raster
    let htmlOutput="", excelOutput="";
    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            let letter=grid[r][c]||"_";
            htmlOutput+=letter+" ";
            excelOutput+=letter+"\t";
        }
        htmlOutput+="<br>";
        excelOutput+="\n";
    }
    document.getElementById("grid").innerHTML=htmlOutput;
    document.getElementById("excel").value=excelOutput;
}
</script>

</body>
</html>
