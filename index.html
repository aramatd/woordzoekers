<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Woordzoeker Generator</title>
<style>
body{
  font-family: monospace;
}
#grid{
  margin-top:20px;
  line-height:1.6;
  font-size:20px;
}
textarea{
  margin-top:10px;
}
</style>
</head>
<body>

<h2>Woordzoeker Generator</h2>

<textarea id="words" rows="15" cols="30">
REY
CUENTAS
SALIENDO
DEBIA
TALENTOS
PAGAR
SENOR
VENDER
MUJER
HIJOS
DEUDA
SUPLICABA
PACIENCIA
PERDONO
MISERICORDIA
SOLTO
CONSIERVO
DENARIOS
PAGAME
CARCEL
MALVADO
ROGASTE
PADRE
CORAZON
HERMANO
CELESTIAL
VOSOTROS
OFENSAS
CADA
UNO
DIEZ
YO
</textarea>

<br><br>
<button onclick="generate()">Genereer puzzel</button>

<div id="grid"></div>
<p id="emptyCount"></p>

<h3>Excel-versie (kopiëren)</h3>
<textarea id="excel" rows="20" cols="60"></textarea>

<script>
const size = 15;  // Rastergrootte
const maxAttempts = 25000; // Aantal pogingen

function generate() {
  let words = document.getElementById("words").value
    .split("\n")
    .map(w => w.trim().toUpperCase())
    .filter(w => w.length>0);

  words.sort((a,b)=>b.length - a.length); // Lange woorden eerst

  let attempts = 0;
  let success = false;
  let grid;

  while(!success && attempts < maxAttempts){
    attempts++;
    grid = Array.from({length:size},()=>Array(size).fill(""));
    success = true;

    for(let word of words){
      let placed = false;
      let directions = ["H","V","D1","D2"];
      directions = directions.sort(()=>Math.random()-0.5); // Shuffle richtingen

      for(let dir of directions){
        let row = Math.floor(Math.random()*size);
        let col = Math.floor(Math.random()*size);
        let len = word.length;

        if(dir==="H" && col+len<=size){
          let fits=true;
          for(let i=0;i<len;i++){
            if(grid[row][col+i]!=="") fits=false;
          }
          if(fits){for(let i=0;i<len;i++){grid[row][col+i]=word[i]} placed=true; break;}

        } else if(dir==="V" && row+len<=size){
          let fits=true;
          for(let i=0;i<len;i++){
            if(grid[row+i][col]!=="") fits=false;
          }
          if(fits){for(let i=0;i<len;i++){grid[row+i][col]=word[i]} placed=true; break;}

        } else if(dir==="D1" && row+len<=size && col+len<=size){ // diag TL->BR
          let fits=true;
          for(let i=0;i<len;i++){
            if(grid[row+i][col+i]!=="") fits=false;
          }
          if(fits){for(let i=0;i<len;i++){grid[row+i][col+i]=word[i]} placed=true; break;}

        } else if(dir==="D2" && row+len<=size && col-len+1>=0){ // diag TR->BL
          let fits=true;
          for(let i=0;i<len;i++){
            if(grid[row+i][col-i]!=="") fits=false;
          }
          if(fits){for(let i=0;i<len;i++){grid[row+i][col-i]=word[i]} placed=true; break;}
        }
      }

      if(!placed){success=false; break;}
    }
  }

  if(!success){alert("Geen oplossing gevonden na "+maxAttempts+" pogingen."); return;}

  draw(grid);
}

function draw(grid){
  let htmlOutput="", excelOutput="";
  let emptyCount = 0;
  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      let letter = grid[r][c] || "_"; // lege vakjes als _
      if(grid[r][c]==="") emptyCount++;
      htmlOutput += letter + " ";
      excelOutput += letter + "\t";
    }
    htmlOutput += "<br>";
    excelOutput += "\n";
  }
  document.getElementById("grid").innerHTML = htmlOutput;
  document.getElementById("excel").value = excelOutput;
  document.getElementById("emptyCount").innerText = "Aantal lege vakjes: " + emptyCount;
}
</script>

</body>
</html>
